<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#111315">
  <title>PrivMsg</title>
  <style>
    html,body{height:100%;margin:0;background:#111315;color:#f2f3f4;font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .loader{height:100%;display:grid;place-items:center}.loader div{text-align:center;color:#9ba1a7;font-size:13px}.loader b{display:block;margin-bottom:8px;color:#f2f3f4;font-size:16px}
  </style>
</head>
<body>
  <div class="loader"><div><b>PrivMsg</b>Loading your conversations…</div></div>
  <script>
    (async () => {
      const sourceUrl = "https://raw.githubusercontent.com/JRDN-R/PrivMsg/beafc9bd5bf2f49214cca0a1195632035ce70c45/index.html";
      const response = await fetch(sourceUrl, { cache: "no-store" });
      if (!response.ok) throw new Error(`Could not load PrivMsg (${response.status})`);
      let html = await response.text();

      const replacements = [
        ["const PREVIEW_THRESHOLD_BYTES = 15 * 1024 * 1024;", "const PREVIEW_THRESHOLD_BYTES = 4 * 1024 * 1024;"],
        ["const CHUNK_UPLOAD_CONCURRENCY = 4;", "const CHUNK_UPLOAD_CONCURRENCY = 6;"],
        ["const CHUNK_FETCH_CONCURRENCY = 10;", "const CHUNK_FETCH_CONCURRENCY = 12;"],
        ["const PREVIEW_MAX_DIMENSION = 1600;", "const PREVIEW_MAX_DIMENSION = 1280;"],
        ["canvasToBlob(canvas, \"image/webp\", 0.78)", "canvasToBlob(canvas, \"image/webp\", 0.72)"],
        ["canvasToBlob(canvas, \"image/jpeg\", 0.82)", "canvasToBlob(canvas, \"image/jpeg\", 0.76)"],
        [
          "const previewBlob = needsPreview ? await createCompressedPreview(file) : null;",
          "let previewBlob = null; if (needsPreview) { try { previewBlob = await createCompressedPreview(file); } catch (error) { console.warn(\"Preview unavailable; uploading original image.\", error); } }"
        ],
        [
          "row.className = \"message-row\";",
          "row.className = \"message-row\"; row.dataset.messageId = message.id; row.dataset.threadId = message.threadId || \"\";"
        ],
      ];

      for (const [before, after] of replacements) {
        if (!html.includes(before)) throw new Error("PrivMsg compatibility patch did not match the saved app.");
        html = html.replace(before, after);
      }

      const ownerPattern = /owner: currentUser\.uid,\s*createdAt: serverTimestamp\(\)/;
      if (!ownerPattern.test(html)) throw new Error("Could not add conversation IDs to outgoing messages.");
      html = html.replace(
        ownerPattern,
        "owner: currentUser.uid,\n          threadId: window.__privmsgActiveThreadId || null,\n          createdAt: serverTimestamp()"
      );

      const renderPattern = /messages\.sort\(\(a, b\) => toMillis\(a\.createdAt\) - toMillis\(b\.createdAt\)\);\s*renderMessages\(\);/;
      if (!renderPattern.test(html)) throw new Error("Could not attach the conversation renderer.");
      html = html.replace(
        renderPattern,
        'messages.sort((a, b) => toMillis(a.createdAt) - toMillis(b.createdAt));\n        renderMessages();\n        window.dispatchEvent(new CustomEvent("privmsg:messages", { detail: { messages } }));'
      );

      html = html.replace(
        "</body>",
        '<script type="module" src="./enhancements.js?v=20260716-1"><\/script></body>'
      );
      document.open();
      document.write(html);
      document.close();
    })().catch(error => {
      console.error(error);
      document.body.innerHTML = `<div class="loader"><div><b>PrivMsg could not load</b>${String(error.message || error)}</div></div>`;
    });
  </script>
</body>
</html>
