<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#111315">
  <title>PrivMsg</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='10' fill='%23282b2f'/%3E%3Cpath d='M9 10.5h14v9.3a3.2 3.2 0 0 1-3.2 3.2H15l-4.6 3v-3.1A3.2 3.2 0 0 1 9 19.8z' fill='none' stroke='%23e8eaec' stroke-width='2' stroke-linejoin='round'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #111315;
      --bg-raised: #16181a;
      --surface: #1c1f22;
      --surface-2: #24272b;
      --surface-3: #2b2f33;
      --border: #303438;
      --border-strong: #3c4146;
      --text: #f2f3f4;
      --muted: #9ba1a7;
      --faint: #6f757b;
      --accent: #dce1e5;
      --accent-ink: #17191b;
      --accent-soft: #9aa9b6;
      --danger: #df7b76;
      --success: #8fb39c;
      --shadow: 0 18px 55px rgba(0, 0, 0, .35);
      --radius: 22px;
      --font: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html {
      height: 100%;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(900px 560px at 50% -260px, rgba(148, 160, 171, .11), transparent 68%),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      touch-action: pan-x pan-y;
      -webkit-font-smoothing: antialiased;
    }

    button, textarea, input { font: inherit; }
    button { color: inherit; }
    button, [role="button"] { -webkit-tap-highlight-color: transparent; }
    ::selection { background: rgba(169, 183, 195, .28); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #383c40; border: 2px solid var(--bg); border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }

    body:not(.authorized) .app-header,
    body:not(.authorized) .thread,
    body:not(.authorized) .composer-region,
    body:not(.authorized) .scroll-bottom,
    body:not(.authorized) .drop-overlay {
      visibility: hidden;
      pointer-events: none;
    }

    .auth-gate {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(720px 460px at 50% 18%, rgba(148, 160, 171, .12), transparent 70%),
        var(--bg);
    }
    .auth-gate[hidden] { display: none; }
    .auth-card {
      width: min(390px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 25px;
      background: rgba(28, 31, 34, .94);
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.035);
      text-align: center;
    }
    .auth-mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 19px;
      display: grid;
      place-items: center;
      border: 1px solid #3b4045;
      border-radius: 18px;
      background: linear-gradient(145deg, #30353a, #202326);
      color: #e8eaec;
      box-shadow: inset 0 1px rgba(255,255,255,.07);
    }
    .auth-mark svg { width: 26px; height: 26px; }
    .auth-card h1 { margin: 0; font-size: 21px; font-weight: 680; letter-spacing: -.03em; }
    .auth-card > p { margin: 9px auto 23px; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .auth-form { display: grid; gap: 12px; }
    .auth-field { display: grid; gap: 7px; text-align: left; }
    .auth-field label {
      color: #b9bec3;
      font-size: 11px;
      font-weight: 650;
      letter-spacing: .045em;
      text-transform: uppercase;
    }
    .auth-field input {
      width: 100%;
      min-height: 46px;
      padding: 11px 13px;
      border: 1px solid #41464b;
      border-radius: 12px;
      outline: 0;
      background: #17191b;
      color: var(--text);
      font-size: 16px;
      transition: border-color .15s, box-shadow .15s;
    }
    .auth-field input::placeholder { color: #686e73; }
    .auth-field input:focus {
      border-color: #697178;
      box-shadow: 0 0 0 3px rgba(153,166,177,.08);
    }
    .login-button {
      width: 100%;
      min-height: 48px;
      margin-top: 3px;
      padding: 11px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      border: 1px solid #4a4f54;
      border-radius: 13px;
      background: #f2f3f4;
      color: #202225;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      transition: background .15s, transform .08s, opacity .15s;
    }
    .login-button:hover:not(:disabled) { background: #fff; }
    .login-button:active:not(:disabled) { transform: scale(.985); }
    .login-button:disabled { opacity: .52; cursor: default; }
    .auth-status {
      min-height: 19px;
      margin: 14px 2px 0;
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.45;
    }
    .auth-status.error { color: #eda29d; }
    .auth-foot { margin-top: 18px; color: var(--faint); font-size: 10.5px; }

    .app-header {
      position: fixed;
      inset: 0 0 auto;
      z-index: 30;
      height: 68px;
      padding: 0 max(18px, env(safe-area-inset-right)) 0 max(18px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, .055);
      background: rgba(17, 19, 21, .82);
      backdrop-filter: blur(20px) saturate(130%);
      -webkit-backdrop-filter: blur(20px) saturate(130%);
    }

    .header-inner {
      width: min(760px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .identity {
      min-width: 0;
      flex: 0 1 auto;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .identity-logo {
      display: block;
      width: min(168px, 52vw);
      height: auto;
      object-fit: contain;
      object-position: left center;
    }

    .connection {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 11px;
    }
    .connection-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--faint);
      box-shadow: 0 0 0 3px rgba(111,117,123,.1);
    }
    .connection[data-state="online"] .connection-dot { background: var(--success); box-shadow: 0 0 0 3px rgba(143,179,156,.1); }
    .connection[data-state="error"] { color: var(--danger); }
    .connection[data-state="error"] .connection-dot { background: var(--danger); box-shadow: 0 0 0 3px rgba(223,123,118,.1); }
    .connection[data-state="connecting"] .connection-dot { animation: breathe 1.4s ease-in-out infinite; }
    @keyframes breathe { 50% { opacity: .25; } }

    .thread {
      width: min(760px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 96px 18px 190px;
    }

    .empty-state {
      min-height: calc(100vh - 300px);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }
    .empty-state[hidden] { display: none; }
    .empty-inner { transform: translateY(-5%); }
    .empty-icon {
      width: 54px;
      height: 54px;
      margin: 0 auto 17px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(145deg, var(--surface-2), var(--surface));
      color: #c9ced2;
      box-shadow: var(--shadow);
    }
    .empty-icon svg { width: 24px; height: 24px; }
    .empty-state h2 { margin: 0; color: var(--text); font-size: 17px; font-weight: 620; letter-spacing: -.02em; }
    .empty-state p { max-width: 310px; margin: 8px auto 0; font-size: 13px; line-height: 1.55; }

    .day-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 26px 0 18px;
      color: var(--faint);
      font-size: 10px;
      font-weight: 650;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .day-divider::before, .day-divider::after { content: ""; height: 1px; flex: 1; background: rgba(255,255,255,.055); }

    .message-row { display: flex; justify-content: flex-end; margin: 0 0 12px; }
    .message {
      position: relative;
      width: fit-content;
      max-width: min(84%, 620px);
      overflow: hidden;
      border: 1px solid #34383c;
      border-radius: 22px 22px 7px 22px;
      background: linear-gradient(145deg, #282c2f, #232629);
      box-shadow: 0 7px 24px rgba(0,0,0,.14);
    }
    .message.has-images { width: min(84%, 520px); }
    .message.has-files { width: min(84%, 520px); }
    .message-text {
      margin: 0;
      padding: 12px 15px 5px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: var(--text);
      font-size: 14.5px;
      line-height: 1.55;
    }
    .message-text:first-child { padding-top: 13px; }

    .gallery {
      display: grid;
      gap: 2px;
      padding: 3px;
      background: #1d2022;
    }
    .gallery.one { grid-template-columns: 1fr; }
    .gallery.two { grid-template-columns: repeat(2, 1fr); }
    .gallery.many { grid-template-columns: repeat(2, 1fr); }
    .gallery.many .media-tile:first-child:nth-last-child(3) { grid-row: span 2; }
    .media-tile {
      position: relative;
      min-height: 130px;
      overflow: hidden;
      border: 0;
      border-radius: 9px;
      background: #191b1d;
      cursor: zoom-in;
    }
    .gallery.one .media-tile { min-height: 220px; max-height: 430px; }
    .media-tile img { display: block; width: 100%; height: 100%; min-height: inherit; object-fit: cover; }
    .media-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--faint);
      background: linear-gradient(105deg, #1c1f21 25%, #25282b 45%, #1c1f21 65%);
      background-size: 220% 100%;
      animation: shimmer 1.4s linear infinite;
    }
    .media-placeholder svg { width: 24px; height: 24px; }
    .media-tile.loaded .media-placeholder { display: none; }
    .media-tile.failed .media-placeholder { animation: none; background: #1c1f21; }
    .media-tile.download-only { cursor: pointer; }
    .media-badge {
      position: absolute;
      right: 9px;
      bottom: 9px;
      z-index: 2;
      max-width: calc(100% - 18px);
      padding: 5px 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      background: rgba(13,15,16,.78);
      color: #f2f4f5;
      box-shadow: 0 4px 15px rgba(0,0,0,.28);
      backdrop-filter: blur(8px);
      font-size: 10px;
      font-weight: 650;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
      pointer-events: none;
    }
    @keyframes shimmer { to { background-position: -220% 0; } }

    .file-list {
      min-width: min(390px, 74vw);
      padding: 7px;
      display: grid;
      gap: 6px;
      background: #1d2022;
    }
    .gallery + .file-list { padding-top: 4px; }
    .file-card {
      min-width: 0;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      border: 1px solid #3a3f43;
      border-radius: 13px;
      background: #25282b;
    }
    .file-card-main {
      min-width: 0;
      min-height: 62px;
      padding: 9px 10px;
      display: flex;
      flex: 1;
      align-items: center;
      gap: 11px;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }
    .file-card-main:disabled { cursor: wait; }
    .file-icon {
      position: relative;
      width: 39px;
      height: 44px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid #464c51;
      border-radius: 9px;
      background: linear-gradient(145deg, #34393d, #292d30);
      color: #dce1e5;
    }
    .file-icon svg { width: 21px; height: 21px; }
    .file-type {
      position: absolute;
      right: 2px;
      bottom: 2px;
      max-width: 34px;
      padding: 2px 3px;
      overflow: hidden;
      border-radius: 4px;
      background: #151719;
      color: #eef0f2;
      font-size: 6.5px;
      font-weight: 750;
      letter-spacing: .025em;
      line-height: 1;
      text-overflow: ellipsis;
    }
    .file-details { min-width: 0; display: grid; gap: 4px; }
    .file-name {
      overflow: hidden;
      color: #f1f3f4;
      font-size: 12.5px;
      font-weight: 590;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-meta { color: #8e9499; font-size: 9.5px; line-height: 1.2; }
    .file-download {
      width: 48px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-left: 1px solid #3a3f43;
      color: #dce1e5;
      text-decoration: none;
      cursor: pointer;
    }
    .file-download:hover { background: rgba(255,255,255,.045); color: white; }
    .file-download[hidden] { display: none; }
    .file-download svg { width: 18px; height: 18px; }
    .file-card.preparing .file-icon { animation: breathe 1.1s ease-in-out infinite; }

    .message-foot {
      min-height: 29px;
      padding: 5px 8px 7px 15px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }
    .message-time { margin-right: 2px; color: #8c9297; font-size: 10.5px; white-space: nowrap; }
    .mini-action {
      width: 26px;
      height: 26px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #8f959a;
      opacity: 0;
      cursor: pointer;
      transition: opacity .15s, color .15s, background .15s;
    }
    .message:hover .mini-action, .mini-action:focus-visible { opacity: 1; }
    .mini-action:hover { color: var(--text); background: rgba(255,255,255,.07); }
    .mini-action.danger:hover { color: var(--danger); }
    .mini-action svg { width: 14px; height: 14px; }

    .composer-region {
      position: fixed;
      inset: auto 0 0;
      z-index: 35;
      padding: 50px max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      background: linear-gradient(to bottom, rgba(17,19,21,0), rgba(17,19,21,.92) 40%, var(--bg) 72%);
      pointer-events: none;
    }
    .composer-wrap { position: relative; width: min(760px, 100%); margin: 0 auto; pointer-events: auto; }
    .attachment-menu {
      position: absolute;
      left: 7px;
      bottom: calc(100% + 10px);
      z-index: 4;
      width: 205px;
      padding: 7px;
      border: 1px solid var(--border-strong);
      border-radius: 15px;
      background: rgba(37,40,43,.98);
      box-shadow: var(--shadow);
      transform-origin: bottom left;
      animation: menu-in .14s ease-out;
    }
    .attachment-menu[hidden] { display: none; }
    @keyframes menu-in { from { opacity: 0; transform: translateY(6px) scale(.98); } }
    .menu-item {
      width: 100%;
      padding: 10px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      text-align: left;
      cursor: pointer;
    }
    .menu-item:hover { background: rgba(255,255,255,.065); }
    .menu-item svg { width: 17px; height: 17px; color: #aeb6bd; }

    .composer {
      overflow: hidden;
      border: 1px solid var(--border-strong);
      border-radius: 25px;
      background: rgba(29,32,35,.97);
      box-shadow: 0 15px 50px rgba(0,0,0,.34), inset 0 1px rgba(255,255,255,.035);
      transition: border-color .16s, box-shadow .16s;
    }
    .composer:focus-within { border-color: #535a60; box-shadow: 0 15px 50px rgba(0,0,0,.34), 0 0 0 3px rgba(153,166,177,.07); }
    .staged-tray {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 12px 12px 4px;
      scrollbar-width: thin;
    }
    .staged-tray:empty { display: none; }
    .staged-item {
      position: relative;
      width: 76px;
      height: 76px;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid #3b4044;
      border-radius: 13px;
      background: var(--surface-2);
    }
    .staged-item img { width: 100%; height: 100%; display: block; object-fit: cover; }
    .staged-file-preview {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #303438, #222528);
      color: #d8dde1;
    }
    .staged-file-preview svg { width: 28px; height: 28px; }
    .staged-file-type {
      position: absolute;
      left: 6px;
      top: 6px;
      max-width: 42px;
      padding: 3px 4px;
      overflow: hidden;
      border-radius: 5px;
      background: rgba(13,15,16,.76);
      color: #f1f3f4;
      font-size: 7px;
      font-weight: 750;
      line-height: 1;
      text-overflow: ellipsis;
      z-index: 2;
    }
    .staged-size {
      position: absolute;
      left: 5px;
      bottom: 5px;
      max-width: calc(100% - 10px);
      padding: 3px 5px;
      overflow: hidden;
      border-radius: 6px;
      background: rgba(13,15,16,.76);
      color: #f1f3f4;
      font-size: 8.5px;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
      pointer-events: none;
    }
    .remove-staged {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 22px;
      height: 22px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 50%;
      background: rgba(15,17,18,.82);
      color: white;
      cursor: pointer;
    }
    .remove-staged svg { width: 11px; height: 11px; }
    .remove-staged:disabled { opacity: .58; cursor: default; }

    .compose-row { display: flex; align-items: flex-end; gap: 8px; padding: 10px 10px 10px 11px; }
    .round-button {
      width: 39px;
      height: 39px;
      flex: 0 0 auto;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      transition: transform .12s, background .15s, color .15s;
    }
    .round-button:active { transform: scale(.94); }
    .attach-button { background: transparent; color: #c3c8cc; }
    .attach-button:hover, .attach-button[aria-expanded="true"] { background: rgba(255,255,255,.07); color: white; }
    .attach-button:disabled { color: #676d72; cursor: default; }
    .attach-button svg { width: 23px; height: 23px; transition: transform .16s; }
    .attach-button[aria-expanded="true"] svg { transform: rotate(45deg); }
    .send-button { background: var(--accent); color: var(--accent-ink); }
    .send-button:hover:not(:disabled) { background: #f2f4f5; }
    .send-button:disabled { background: #303438; color: #70767b; cursor: default; }
    .send-button svg { width: 20px; height: 20px; }
    .mic-button {
      position: relative;
      background: transparent;
      color: #c3c8cc;
    }
    .mic-button:hover:not(:disabled) { background: rgba(255,255,255,.07); color: white; }
    .mic-button:disabled { color: #676d72; cursor: default; }
    .mic-button svg { width: 20px; height: 20px; }
    .mic-button.is-recording {
      background: #f2f3f4;
      color: #17191b;
      box-shadow: 0 0 0 0 rgba(242,243,244,.28);
      animation: mic-pulse 1.6s ease-out infinite;
    }
    .mic-button.is-recording svg { width: 16px; height: 16px; }
    @keyframes mic-pulse {
      70% { box-shadow: 0 0 0 8px rgba(242,243,244,0); }
      100% { box-shadow: 0 0 0 0 rgba(242,243,244,0); }
    }

    .transcription-progress {
      height: 3px;
      overflow: hidden;
      background: rgba(255,255,255,.045);
      opacity: 0;
      transition: opacity .16s;
      pointer-events: none;
    }
    .transcription-progress.active { opacity: 1; }
    .transcription-progress-bar {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,.5);
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform .48s ease-out;
    }

    #messageInput {
      width: 100%;
      min-width: 0;
      min-height: 39px;
      max-height: 160px;
      padding: 9px 4px 7px;
      resize: none;
      overflow-y: auto;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
    }
    #messageInput::placeholder { color: #7c8287; }
    .composer-meta {
      min-height: 17px;
      padding: 0 15px 7px;
      display: flex;
      justify-content: flex-end;
      color: var(--faint);
      font-size: 10.5px;
    }
    .composer-meta:empty { display: none; }

    .drop-overlay {
      position: fixed;
      inset: 14px;
      z-index: 90;
      display: grid;
      place-items: center;
      border: 2px dashed #87949f;
      border-radius: 24px;
      background: rgba(17,19,21,.92);

    function dayLabel(timestamp) {
      const date = new Date(toMillis(timestamp));
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      const sameDay = (a, b) => a.toDateString() === b.toDateString();
      if (sameDay(date, today)) return "Today";
      if (sameDay(date, yesterday)) return "Yesterday";
      return date.toLocaleDateString([], { month: "short", day: "numeric", year: date.getFullYear() === today.getFullYear() ? undefined : "numeric" });

        String(meta?.type || "").startsWith("image/") ||
        /\.(png|jpe?g|gif|webp|bmp|tiff?|svg|avif|heic|heif)$/i.test(meta?.name || "")

      if (type === "application/pdf") return "PDF";
      const match = String(name || "").match(/\.([a-z0-9]{1,8})$/i);
      if (match) return match[1].toUpperCase();

      const units = ["B", "KB", "MB", "GB"];
      const unitIndex = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
      const value = bytes / (1024 ** unitIndex);
      return `${value >= 10 || unitIndex === 0 ? Math.round(value) : value.toFixed(1)} ${units[unitIndex]}`;
    }

    function bytesToBase64(bytes) {
      const segments = [];
      const segmentSize = 32768;
      for (let index = 0; index < bytes.length; index += segmentSize) {
        segments.push(String.fromCharCode(...bytes.subarray(index, index + segmentSize)));
      }
      return btoa(segments.join(""));
    }

    function base64ToBytes(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index++) bytes[index] = binary.charCodeAt(index);
      return bytes;
    }

    async function mapWithConcurrency(count, limit, callback) {
      const results = new Array(count);
      let nextIndex = 0;

      async function worker() {
        while (nextIndex < count) {
          const index = nextIndex++;
          results[index] = await callback(index);
        }
      }

      const workerCount = Math.min(count, limit);
      await Promise.all(Array.from({ length: workerCount }, () => worker()));
      return results;
    }

    function chunkCountForBlob(blob) {
      return Math.ceil(blob.size / BINARY_CHUNK_BYTES);
    }

    async function storeBlobChunks(blob, key, owner, onProgress = () => {}) {
      const chunkCount = chunkCountForBlob(blob);
      let completed = 0;
      await mapWithConcurrency(chunkCount, CHUNK_UPLOAD_CONCURRENCY, async index => {
        const start = index * BINARY_CHUNK_BYTES;
        const bytes = new Uint8Array(await blob.slice(start, start + BINARY_CHUNK_BYTES).arrayBuffer());
        await setDoc(doc(db, COLL, `chunk_${key}_${index}`), {
          kind: "chunk",
          key,
          index,
          data: bytesToBase64(bytes),
          encoding: CHUNK_ENCODING,
          owner
        });
        completed++;
        onProgress(completed, chunkCount);
      });
      return chunkCount;
    }

    async function deleteChunkSet(key, chunkCount) {
      if (!key || !chunkCount) return;
      await mapWithConcurrency(chunkCount, CHUNK_FETCH_CONCURRENCY, index => (
        deleteDoc(doc(db, COLL, `chunk_${key}_${index}`))
      ));
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise(resolve => canvas.toBlob(resolve, type, quality));
    }

    async function createCompressedPreview(file) {
      let source;
      let sourceUrl = "";
      let cleanup = () => {};

      if ("createImageBitmap" in window) {
        try {
          source = await createImageBitmap(file);
          cleanup = () => source.close();
        } catch {
          source = null;
        }
      }

      if (!source) {
        sourceUrl = URL.createObjectURL(file);
        source = new Image();
        source.decoding = "async";
        cleanup = () => URL.revokeObjectURL(sourceUrl);
        try {
          await new Promise((resolve, reject) => {
            source.addEventListener("load", resolve, { once: true });
            source.addEventListener("error", () => reject(new Error("This image format cannot be previewed in this browser")), { once: true });
            source.src = sourceUrl;
          });
        } catch (error) {
          cleanup();
          throw error;
        }
      }

      try {
        const width = source.width || source.naturalWidth;
        const height = source.height || source.naturalHeight;
        if (!width || !height) throw new Error("This image has invalid dimensions");
        const scale = Math.min(1, PREVIEW_MAX_DIMENSION / Math.max(width, height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));
        const context = canvas.getContext("2d", { alpha: true });
        if (!context) throw new Error("Could not create an image preview");
        context.drawImage(source, 0, 0, canvas.width, canvas.height);
        let preview = await canvasToBlob(canvas, "image/webp", 0.78);
        if (!preview || preview.type !== "image/webp") {
          preview = await canvasToBlob(canvas, "image/jpeg", 0.82);
        }
        if (!preview) throw new Error("Could not compress the image preview");
        return preview;
      } finally {
        cleanup();
      }
    }

    function dataUrlToBlob(dataUrl) {
      const comma = dataUrl.indexOf(",");
      const header = dataUrl.slice(0, comma);
      const binary = atob(dataUrl.slice(comma + 1));
      const mime = (header.match(/data:(.*?)(;|$)/) || [])[1] || "application/octet-stream";
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mime });
    }

    function nearBottom() {
      return document.documentElement.scrollHeight - window.scrollY - window.innerHeight < 190;
    }

    function scrollToLatest(behavior = "smooth") {
      window.scrollTo({ top: document.documentElement.scrollHeight, behavior });
    }

    function updateScrollButton() {
      scrollBottomButton.hidden = nearBottom();
    }

    function autoSizeInput() {
      messageInput.style.height = "0";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + "px";
    }

    function updateSendState() {
      sendButton.disabled = saving || preparingFiles > 0 || audioState !== "idle" || !currentUser || (!messageInput.value.trim() && staged.length === 0);
      micButton.disabled = saving || preparingFiles > 0 || audioState === "transcribing" || !currentUser || !audioCaptureSupported;
      attachButton.disabled = saving || preparingFiles > 0 || !currentUser;
    }

    function closeAttachmentMenu() {
      attachmentMenu.hidden = true;
      attachButton.setAttribute("aria-expanded", "false");
    }

    async function addFiles(fileList) {
      if (saving) {
        toast("Wait for the current upload to finish");
        return;
      }
      const all = [...fileList];
      const files = all.filter(file => file && typeof file.slice === "function" && file.size > 0);
      const skipped = all.length - files.length;
      if (skipped) toast(`${skipped} empty or unsupported file${skipped === 1 ? " was" : "s were"} skipped`);
      if (!files.length) return;

      preparingFiles++;
      updateSendState();
      try {
        for (const file of files) {
          try {
            const imageFile = isImage(file);
            const needsPreview = imageFile && file.size > PREVIEW_THRESHOLD_BYTES;
            composerMeta.textContent = needsPreview
              ? `Creating preview for ${file.name || "large image"}…`
              : `Adding ${file.name || "file"}…`;
            const previewBlob = needsPreview ? await createCompressedPreview(file) : null;
            staged.push({
              name: file.name || (imageFile ? `pasted-${Date.now()}.${extFromMime(file.type)}` : `file-${Date.now()}`),
              type: file.type || "application/octet-stream",
              size: file.size,
              file,
              category: imageFile ? "image" : "file",
              previewBlob,
              objectUrl: imageFile ? URL.createObjectURL(previewBlob || file) : ""
            });
          } catch (error) {
            console.error(error);
            toast(`${file.name || "That file"}: ${error.message}`, true);
          }
        }
      } finally {
        preparingFiles--;
        if (!preparingFiles) composerMeta.textContent = "";
        renderStaged();
        updateSendState();
      }
    }

    function releaseStaged(items = staged) {
      for (const item of items) {
        if (item.objectUrl) URL.revokeObjectURL(item.objectUrl);
      }
    }

    function renderStaged() {
      stagedTray.replaceChildren();
      staged.forEach((item, index) => {
        const tile = document.createElement("div");
        tile.className = "staged-item";
        let preview;
        if (item.category === "image") {
          preview = document.createElement("img");
          preview.src = item.objectUrl;
          preview.alt = item.name;
        } else {
          preview = document.createElement("div");
          preview.className = "staged-file-preview";
          preview.innerHTML = iconFile;
          const type = document.createElement("span");
          type.className = "staged-file-type";
          type.textContent = fileTypeLabel(item.name, item.type);
          tile.append(type);
        }
        const size = document.createElement("span");
        size.className = "staged-size";
        size.textContent = formatBytes(item.size);
        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "remove-staged";
        remove.disabled = saving;
        remove.setAttribute("aria-label", `Remove ${item.name}`);
        remove.innerHTML = iconX;
        remove.addEventListener("click", () => {
          if (saving) return;
          const [removed] = staged.splice(index, 1);
          if (removed?.objectUrl) URL.revokeObjectURL(removed.objectUrl);
          renderStaged();
          updateSendState();
        });
        tile.append(preview, size, remove);
        stagedTray.append(tile);
      });
    }

    function insertTextAtCursor(text) {
      const start = messageInput.selectionStart;
      const end = messageInput.selectionEnd;
      const before = messageInput.value.slice(0, start);
      const after = messageInput.value.slice(end);
      messageInput.value = before + text + after;
      const caret = start + text.length;
      messageInput.setSelectionRange(caret, caret);
      messageInput.dispatchEvent(new Event("input"));
      messageInput.focus();
    }

    function appendTranscript(text) {
      const clean = String(text || "").trim();
      if (!clean) return;
      const separator = messageInput.value && !/\s$/.test(messageInput.value) ? " " : "";
      messageInput.value += separator + clean;
      const caret = messageInput.value.length;
      messageInput.setSelectionRange(caret, caret);
      messageInput.dispatchEvent(new Event("input"));
    }

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const value = String(reader.result || "");
          const comma = value.indexOf(",");
          resolve(comma >= 0 ? value.slice(comma + 1) : value);
        };
        reader.onerror = () => reject(new Error("Could not prepare the recording for transcription."));
        reader.readAsDataURL(blob);
      });
    }

    function preferredAudioType() {
      const candidates = [
        { mime: "audio/webm;codecs=opus", extension: "webm" },
        { mime: "audio/mp4;codecs=mp4a.40.2", extension: "m4a" },
        { mime: "audio/mp4", extension: "m4a" },
        { mime: "audio/webm", extension: "webm" }
      ];
      return candidates.find(item => MediaRecorder.isTypeSupported(item.mime)) || { mime: "", extension: "webm" };
    }

    function stopMediaTracks() {
      if (!mediaStream) return;
      for (const track of mediaStream.getTracks()) track.stop();
      mediaStream = null;
    }

    function stopRecordingTimer() {
      clearInterval(recordingTimer);
      recordingTimer = null;
    }

    function updateRecordingLabel() {
      const seconds = Math.max(0, Math.floor((Date.now() - recordingStartedAt) / 1000));
      const minutes = Math.floor(seconds / 60);
      const remainder = String(seconds % 60).padStart(2, "0");
      micButton.setAttribute("aria-label", "Stop recording, " + minutes + ":" + remainder);
      micButton.title = "Stop recording · " + minutes + ":" + remainder;
    }

    function setProgressValue(value) {
      const normalized = Math.max(0, Math.min(100, value));
      transcriptionProgressBar.style.transform = "scaleX(" + (normalized / 100) + ")";
      transcriptionProgress.setAttribute("aria-valuenow", String(Math.round(normalized)));
    }

    function startTranscriptionProgress() {
      clearInterval(progressTimer);
      progressStartedAt = Date.now();
      transcriptionProgress.classList.add("active");
      transcriptionProgress.setAttribute("aria-hidden", "false");
      setProgressValue(4);
      progressTimer = setInterval(() => {
        const elapsed = Date.now() - progressStartedAt;
        const value = Math.min(92, 8 + 84 * (1 - Math.exp(-elapsed / 45000)));
        setProgressValue(value);
      }, 500);
    }

    function finishTranscriptionProgress() {
      clearInterval(progressTimer);
      progressTimer = null;
      setProgressValue(100);
      setTimeout(() => {
        transcriptionProgress.classList.remove("active");
        transcriptionProgress.setAttribute("aria-hidden", "true");
        setProgressValue(0);
      }, 260);
    }

    function setAudioState(nextState) {
      audioState = nextState;
      const recording = nextState === "recording";
      micButton.classList.toggle("is-recording", recording);
      micButton.innerHTML = recording ? iconStop : iconMic;
      micButton.setAttribute("aria-label", recording ? "Stop recording" : nextState === "transcribing" ? "Transcribing audio" : "Start voice transcription");
      micButton.title = recording ? "Stop recording" : nextState === "transcribing" ? "Transcribing audio" : "Voice transcription";
      if (nextState === "transcribing") startTranscriptionProgress();
      updateSendState();
    }

    async function openMicrophone() {
      const constraints = {
        video: false,
        audio: {
          channelCount: { ideal: 1 },
          sampleRate: { ideal: 24000 },
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      };
      try {
        return await navigator.mediaDevices.getUserMedia(constraints);
      } catch (error) {
        if (error?.name === "OverconstrainedError") {
          return navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        }
        throw error;
      }
    }

    function friendlyMicrophoneError(error) {
      switch (error?.name) {
        case "NotAllowedError":
        case "SecurityError":
          return "Microphone access was blocked. Allow it in the browser settings and try again.";
        case "NotFoundError":
          return "No microphone was found.";
        case "NotReadableError":
          return "The microphone is already in use by another app.";
        default:
          return "Could not start the microphone.";
      }
    }

    async function startVoiceRecording() {
      if (!audioCaptureSupported) {
        toast("Voice recording is not supported in this browser.", true);
        return;
      }
      if (!currentUser || audioState !== "idle") return;

      try {
        mediaStream = await openMicrophone();
        const preferred = preferredAudioType();
        const options = { audioBitsPerSecond: AUDIO_BITRATE };
        if (preferred.mime) options.mimeType = preferred.mime;

        try {
          mediaRecorder = new MediaRecorder(mediaStream, options);
        } catch {
          mediaRecorder = new MediaRecorder(mediaStream);
        }

        audioChunks = [];
        recordingBytes = 0;
        recordingFailed = false;

        mediaRecorder.addEventListener("dataavailable", event => {
          if (!event.data?.size) return;
          audioChunks.push(event.data);
          recordingBytes += event.data.size;
          if (recordingBytes >= MAX_AUDIO_BYTES && mediaRecorder?.state === "recording") {
            toast("Recording reached the upload limit and is being transcribed.", true);
            mediaRecorder.stop();
          }
        });

        mediaRecorder.addEventListener("error", event => {
          recordingFailed = true;
          console.error(event.error || event);
          toast("The audio recording failed.", true);
        });

        mediaRecorder.addEventListener("stop", processRecordedAudio, { once: true });
        mediaRecorder.start(1000);
        recordingStartedAt = Date.now();
        updateRecordingLabel();
        recordingTimer = setInterval(updateRecordingLabel, 1000);
        setAudioState("recording");
      } catch (error) {
        console.error(error);
        stopMediaTracks();
        stopRecordingTimer();
        setAudioState("idle");
        toast(friendlyMicrophoneError(error), true);
      }
    }

    function stopVoiceRecording() {
      if (audioState !== "recording" || !mediaRecorder) return;
      stopRecordingTimer();
      if (mediaRecorder.state !== "inactive") mediaRecorder.stop();
    }

    async function processRecordedAudio() {
      stopRecordingTimer();
      stopMediaTracks();

      const recorder = mediaRecorder;
      const chunks = audioChunks;
      mediaRecorder = null;
      audioChunks = [];

      if (recordingFailed || !chunks.length) {
        setAudioState("idle");
        if (!recordingFailed) toast("No audio was captured.", true);
        return;
      }

      const mime = recorder?.mimeType || chunks[0].type || "audio/webm";
      const audio = new Blob(chunks, { type: mime });
      if (!audio.size) {
        setAudioState("idle");
        toast("No audio was captured.", true);
        return;
      }
      if (audio.size > MAX_AUDIO_BYTES) {
        setAudioState("idle");
        toast("The recording is too large for transcription.", true);
        return;
      }

      await transcribeAudio(audio);
    }

    function friendlyTranscriptionError(error) {
      switch (error?.code) {
        case "functions/unauthenticated":
          return "Your sign-in expired. Reload the page and sign in again.";
        case "functions/permission-denied":
          return "This Firebase account is not authorized to transcribe audio.";
        case "functions/resource-exhausted":
          return "The recording is too large, or the OpenAI quota has been reached.";
        case "functions/failed-precondition":
          return "The OpenAI API key was rejected.";
        case "functions/deadline-exceeded":
          return "Transcription took too long. Try a shorter recording.";
        case "functions/unavailable":
          return "The transcription service is temporarily unavailable.";
        default:
          return error?.message || "Unknown error";
      }
    }

    async function transcribeAudio(audio) {
      setAudioState("transcribing");
      try {
        const audioBase64 = await blobToBase64(audio);
        const response = await transcribeAudioCallable({
          audioBase64,
          mimeType: audio.type || "audio/webm"
        });
        const transcript = String(response?.data?.text || "").trim();
        if (!transcript) throw new Error("The transcription service returned an empty transcript.");
        appendTranscript(transcript);
      } catch (error) {
        console.error(error);
        toast("Transcription failed: " + friendlyTranscriptionError(error), true);
      } finally {
        finishTranscriptionProgress();
        setAudioState("idle");
      }
    }

    async function toggleVoiceRecording() {
      if (audioState === "recording") stopVoiceRecording();
      else if (audioState === "idle") await startVoiceRecording();
    }

    async function pasteFromClipboard() {
      closeAttachmentMenu();
      try {
        const items = await navigator.clipboard.read();
        const files = [];
        for (const item of items) {
          for (const type of item.types) {
            if (type.startsWith("image/")) {
              const blob = await item.getType(type);
              files.push(new File([blob], `pasted-${Date.now()}.${extFromMime(type)}`, { type }));
            }
          }
        }
        if (files.length) {
          await addFiles(files);
          return;
        }
        const text = await navigator.clipboard.readText();
        if (text) insertTextAtCursor(text);
        else toast("The clipboard is empty");
      } catch {
        toast("Press Ctrl+V or Cmd+V to paste", true);
        messageInput.focus();
      }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if ((!text && !staged.length) || saving) return;
      if (!currentUser) {
        toast("Still connecting. Try again in a moment.");
        return;
      }

      const outgoingAttachments = [...staged];
      const uploadedChunkSets = [];
      closeAttachmentMenu();
      saving = true;
      composerMeta.textContent = outgoingAttachments.length ? "Preparing attachments…" : "Sending…";
      updateSendState();
      renderStaged();

      try {
        const attachmentMetadata = [];
        for (let attachmentIndex = 0; attachmentIndex < outgoingAttachments.length; attachmentIndex++) {
          const attachment = outgoingAttachments[attachmentIndex];
          const key = crypto.randomUUID();
          const chunkCount = chunkCountForBlob(attachment.file);
          uploadedChunkSets.push({ key, chunks: chunkCount });
          await storeBlobChunks(attachment.file, key, currentUser.uid, (completed, total) => {
            const percent = Math.round((completed / total) * 100);
            composerMeta.textContent = `Uploading ${attachment.category === "image" ? "image" : "file"} ${attachmentIndex + 1} of ${outgoingAttachments.length} · ${percent}%`;
          });

          const metadata = {
            name: attachment.name,
            type: attachment.type,
            size: attachment.size,
            category: attachment.category,
            key,
            chunks: chunkCount,
            encoding: CHUNK_ENCODING,
            downloadOnly: attachment.category === "image" && attachment.size >= DOWNLOAD_ONLY_BYTES
          };

          if (attachment.previewBlob) {
            const previewKey = crypto.randomUUID();
            const previewChunks = chunkCountForBlob(attachment.previewBlob);
            uploadedChunkSets.push({ key: previewKey, chunks: previewChunks });
            composerMeta.textContent = `Uploading preview ${attachmentIndex + 1} of ${outgoingAttachments.length}…`;
            await storeBlobChunks(attachment.previewBlob, previewKey, currentUser.uid);
            metadata.preview = {
              key: previewKey,
              chunks: previewChunks,
              type: attachment.previewBlob.type || "image/webp",
              size: attachment.previewBlob.size,
              encoding: CHUNK_ENCODING
            };
          }

          attachmentMetadata.push(metadata);
        }

        await addDoc(collection(db, COLL), {
          kind: "drop",
          text,
          attachments: attachmentMetadata,
          owner: currentUser.uid,
          createdAt: serverTimestamp()
        });

        messageInput.value = "";
        releaseStaged(outgoingAttachments);
        staged = [];
        renderStaged();
        autoSizeInput();
        composerMeta.textContent = "";
        setTimeout(() => scrollToLatest(), 80);
      } catch (error) {
        console.error(error);
        composerMeta.textContent = "";
        if (uploadedChunkSets.length) {
          await Promise.allSettled(
            uploadedChunkSets.map(item => deleteChunkSet(item.key, item.chunks))
          );
        }
        toast(`Message failed: ${error.code || error.message}`, true);
      } finally {
        saving = false;
        renderStaged();
        updateSendState();
        messageInput.focus();
      }
    }

    async function getAttachmentUrl(meta, { cache = true } = {}) {
      if (cache && attachmentUrlCache.has(meta.key)) return attachmentUrlCache.get(meta.key);
      if (cache && attachmentUrlPending.has(meta.key)) return attachmentUrlPending.get(meta.key);

      const loadPromise = (async () => {
        const chunkCount = Number(meta.chunks);
        if (!meta.key || !Number.isInteger(chunkCount) || chunkCount < 1) {
          throw new Error("Attachment metadata is incomplete");
        }

        let blob;
        if (meta.encoding === CHUNK_ENCODING) {
          const byteParts = await mapWithConcurrency(chunkCount, CHUNK_FETCH_CONCURRENCY, async index => {
            const snapshot = await getDoc(doc(db, COLL, `chunk_${meta.key}_${index}`));
            if (!snapshot.exists()) throw new Error("Attachment data is incomplete");
            const encoded = String(snapshot.data().data || "");
            if (!encoded) throw new Error("Attachment data is incomplete");
            return base64ToBytes(encoded);
          });
          blob = new Blob(byteParts, { type: meta.type || "application/octet-stream" });
        } else {
          const dataParts = await mapWithConcurrency(chunkCount, CHUNK_FETCH_CONCURRENCY, async index => {
            const snapshot = await getDoc(doc(db, COLL, `chunk_${meta.key}_${index}`));
            if (!snapshot.exists()) throw new Error("Attachment data is incomplete");
            return String(snapshot.data().data || "");
          });
          blob = dataUrlToBlob(dataParts.join(""));
        }

        const expectedSize = Number(meta.size);
        if (Number.isFinite(expectedSize) && expectedSize > 0 && blob.size !== expectedSize) {
          throw new Error("Attachment data did not pass its size check");
        }

        const url = URL.createObjectURL(blob);
        if (cache) attachmentUrlCache.set(meta.key, url);
        return url;
      })();

      if (cache) attachmentUrlPending.set(meta.key, loadPromise);
      try {
        return await loadPromise;
      } finally {
        if (cache) attachmentUrlPending.delete(meta.key);
      }
    }

    function openLightbox(url, name, key, downloadUrl = url) {
      if (temporaryDownloadUrl) {
        URL.revokeObjectURL(temporaryDownloadUrl);
        temporaryDownloadUrl = "";
      }
      activeLightboxKey = key || null;
      lightbox.classList.remove("is-loading");
      lightbox.setAttribute("aria-busy", "false");
      lightboxImage.src = url;
      lightboxImage.alt = name || "Message image";
      lightboxDownload.download = name || "image";
      lightboxDownload.hidden = !downloadUrl;
      if (downloadUrl) lightboxDownload.href = downloadUrl;
      else lightboxDownload.removeAttribute("href");
      lightbox.hidden = false;
      document.body.style.overflow = "hidden";
      lightboxClose.focus();
    }

    function closeLightbox() {
      activeLightboxKey = null;
      lightbox.classList.remove("is-loading");
      lightbox.setAttribute("aria-busy", "false");
      if (temporaryDownloadUrl) {
        URL.revokeObjectURL(temporaryDownloadUrl);
        temporaryDownloadUrl = "";
      }
      lightbox.hidden = true;
      lightboxImage.removeAttribute("src");
      lightboxDownload.removeAttribute("href");
      lightboxDownload.hidden = false;
      document.body.style.overflow = "";
    }

    async function openFullImage(meta, previewUrl) {
      openLightbox(previewUrl, meta.name, meta.key, null);
      lightbox.classList.add("is-loading");
      lightbox.setAttribute("aria-busy", "true");
      toast(`Loading full-size ${formatBytes(meta.size)} image…`);
      try {
        const fullUrl = await getAttachmentUrl(meta);
        if (activeLightboxKey !== meta.key || lightbox.hidden) return;
        lightboxImage.src = fullUrl;
        lightboxDownload.href = fullUrl;
        lightboxDownload.download = meta.name || "image";
        lightboxDownload.hidden = false;
      } catch (error) {
        console.error(error);
        toast("The full-size image could not be opened", true);
      } finally {
        if (activeLightboxKey === meta.key) {
          lightbox.classList.remove("is-loading");
          lightbox.setAttribute("aria-busy", "false");
        }
      }
    }

    async function prepareOriginalDownload(meta, previewUrl, tile) {
      if (tile.dataset.busy === "true") return;
      tile.dataset.busy = "true";
      tile.disabled = true;
      openLightbox(previewUrl, meta.name, meta.key, null);
      lightbox.classList.add("is-loading");
      lightbox.setAttribute("aria-busy", "true");
      toast(`Preparing ${formatBytes(meta.size)} download…`);
      try {
        const url = await getAttachmentUrl(meta, { cache: false });
        if (activeLightboxKey !== meta.key || lightbox.hidden) {
          URL.revokeObjectURL(url);
          return;
        }
        temporaryDownloadUrl = url;
        lightboxDownload.href = url;
        lightboxDownload.download = meta.name || "image";
        lightboxDownload.hidden = false;
        toast("Download ready · tap the arrow");
      } catch (error) {
        console.error(error);
        toast("The original image could not be downloaded", true);
      } finally {
        if (activeLightboxKey === meta.key) {
          lightbox.classList.remove("is-loading");
          lightbox.setAttribute("aria-busy", "false");
        }
        tile.disabled = false;
        delete tile.dataset.busy;
      }
    }

    async function hydrateMedia(tile, meta) {
      try {
        const hasPreview = Boolean(meta.preview?.key && meta.preview?.chunks);
        const displayMeta = hasPreview
          ? { ...meta.preview, name: meta.name }
          : meta;
        const url = await getAttachmentUrl(displayMeta);
        const image = document.createElement("img");
        image.alt = meta.name || "Attached image";
        image.loading = "lazy";
        image.src = url;
        image.addEventListener("load", () => tile.classList.add("loaded"), { once: true });
        image.addEventListener("error", () => tile.classList.add("failed"), { once: true });
        tile.prepend(image);

        const downloadOnly = Boolean(meta.downloadOnly || Number(meta.size) >= DOWNLOAD_ONLY_BYTES);
        if (hasPreview) {
          const badge = document.createElement("span");
          badge.className = "media-badge";
          badge.textContent = downloadOnly
            ? `Download original · ${formatBytes(meta.size)}`
            : `Tap for full · ${formatBytes(meta.size)}`;
          tile.append(badge);
        }

        if (downloadOnly) {
          tile.classList.add("download-only");
          tile.setAttribute("aria-label", `Download ${meta.name || "original image"}`);
          tile.addEventListener("click", () => prepareOriginalDownload(meta, url, tile));
        } else if (hasPreview) {
          tile.addEventListener("click", () => openFullImage(meta, url));
        } else {
          tile.addEventListener("click", () => openLightbox(url, meta.name, meta.key));
        }
      } catch (error) {
        console.error(error);
        tile.classList.add("failed");
        const placeholder = tile.querySelector(".media-placeholder");
        if (placeholder) placeholder.setAttribute("title", "Image unavailable");
      }
    }

    async function prepareFileDownload(meta, card, main, download, status) {
      if (download.hasAttribute("href")) {
        download.click();
        return;
      }
      if (card.dataset.busy === "true") return;

      card.dataset.busy = "true";
      card.classList.add("preparing");
      main.disabled = true;
      status.textContent = `Preparing ${formatBytes(meta.size)}…`;
      toast(`Preparing ${meta.name || "file"}…`);

      try {
        const url = await getAttachmentUrl(meta);
        download.href = url;
        download.download = meta.name || "download";
        download.hidden = false;
        status.textContent = `${formatBytes(meta.size)} · Ready to download`;
        main.setAttribute("aria-label", `Download ${meta.name || "file"}`);
        toast("File ready · tap the download arrow");
      } catch (error) {
        console.error(error);
        status.textContent = `${formatBytes(meta.size)} · Tap to retry`;
        toast("The file could not be prepared", true);
      } finally {
        main.disabled = false;
        card.classList.remove("preparing");
        delete card.dataset.busy;
      }
    }

    function createFileCard(meta) {
      const card = document.createElement("div");
      card.className = "file-card";

      const main = document.createElement("button");
      main.type = "button";
      main.className = "file-card-main";
      main.setAttribute("aria-label", `Prepare ${meta.name || "file"} for download`);

      const icon = document.createElement("span");
      icon.className = "file-icon";
      icon.innerHTML = iconFile;
      const type = document.createElement("span");
      type.className = "file-type";
      type.textContent = fileTypeLabel(meta.name, meta.type);
      icon.append(type);

      const details = document.createElement("span");
      details.className = "file-details";
      const name = document.createElement("span");
      name.className = "file-name";
      name.textContent = meta.name || "Attached file";
      name.title = meta.name || "Attached file";
      const status = document.createElement("span");
      status.className = "file-meta";
      status.textContent = `${formatBytes(meta.size)} · Tap to prepare download`;
      details.append(name, status);
      main.append(icon, details);

      const download = document.createElement("a");
      download.className = "file-download";
      download.hidden = true;
      download.setAttribute("aria-label", `Download ${meta.name || "file"}`);
      download.title = `Download ${meta.name || "file"}`;
      download.target = "_blank";
      download.rel = "noopener";
      download.innerHTML = iconDownload;

      main.addEventListener("click", () => prepareFileDownload(meta, card, main, download, status));
      card.append(main, download);
      return card;
    }

    function actionButton(label, icon, className = "") {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `mini-action ${className}`.trim();
      button.setAttribute("aria-label", label);
      button.title = label;
      button.innerHTML = icon;
      return button;
    }

    async function deleteMessage(message, button) {
      if (!confirm("Delete this message permanently?")) return;
      button.disabled = true;
      try {
        const attachments = attachmentsForMessage(message);
        const chunkDeletes = [];
        for (const attachment of attachments) {
          chunkDeletes.push(deleteChunkSet(attachment.key, attachment.chunks));
          if (attachment.preview?.key) chunkDeletes.push(deleteChunkSet(attachment.preview.key, attachment.preview.chunks));
        }
        await Promise.all(chunkDeletes);
        await deleteDoc(doc(db, COLL, message.id));
        for (const attachment of attachments) {
          for (const key of [attachment.key, attachment.preview?.key].filter(Boolean)) {
            const url = attachmentUrlCache.get(key);
            if (url) URL.revokeObjectURL(url);
            attachmentUrlCache.delete(key);
            attachmentUrlPending.delete(key);
          }
        }
        toast("Message deleted");
      } catch (error) {
        console.error(error);
        toast(`Delete failed: ${error.code || error.message}`, true);
        button.disabled = false;
      }
    }

    function createMessage(message) {
      const row = document.createElement("div");
      row.className = "message-row";
      const bubble = document.createElement("article");
      const attachments = attachmentsForMessage(message);
      const imageAttachments = attachments.filter(isImageMetadata);
      const fileAttachments = attachments.filter(meta => !isImageMetadata(meta));
      const hasImages = imageAttachments.length > 0;
      const hasFiles = fileAttachments.length > 0;
      bubble.className = `message${hasImages ? " has-images" : ""}${hasFiles ? " has-files" : ""}`;

      if (hasImages) {
        const gallery = document.createElement("div");
        gallery.className = `gallery ${imageAttachments.length === 1 ? "one" : imageAttachments.length === 2 ? "two" : "many"}`;
        imageAttachments.forEach(meta => {
          const tile = document.createElement("button");
          tile.type = "button";
          tile.className = "media-tile";
          const downloadOnly = Boolean(meta.downloadOnly || Number(meta.size) >= DOWNLOAD_ONLY_BYTES);
          tile.setAttribute("aria-label", `${downloadOnly ? "Download" : "Open"} ${meta.name || "image"}`);
          const placeholder = document.createElement("span");
          placeholder.className = "media-placeholder";
          placeholder.innerHTML = iconImage;
          tile.append(placeholder);
          gallery.append(tile);
          hydrateMedia(tile, meta);
        });
        bubble.append(gallery);
      }

      if (hasFiles) {
        const fileList = document.createElement("div");
        fileList.className = "file-list";
        fileAttachments.forEach(meta => fileList.append(createFileCard(meta)));
        bubble.append(fileList);
      }

      if (message.text) {
        const text = document.createElement("p");
        text.className = "message-text";
        text.textContent = message.text;
        bubble.append(text);
      }

      const foot = document.createElement("footer");
      foot.className = "message-foot";
      const time = document.createElement("time");
      time.className = "message-time";
      time.textContent = message.createdAt ? timeLabel(message.createdAt) : "Sending…";
      foot.append(time);

      if (message.text) {
        const copy = actionButton("Copy text", iconCopy);
        copy.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(message.text);
            toast("Text copied");
          } catch {
            toast("Could not copy the text", true);
          }
        });
        foot.append(copy);
      }

      const remove = actionButton("Delete message", iconTrash, "danger");
      remove.addEventListener("click", () => deleteMessage(message, remove));
      foot.append(remove);
      bubble.append(foot);
      row.append(bubble);
      return row;
    }

    function renderMessages() {
      const shouldStick = initialRender || nearBottom();
      messageList.replaceChildren();
      emptyState.hidden = messages.length > 0;
      let previousDay = "";

      for (const message of messages) {
        const key = dayKey(message.createdAt);
        if (key !== previousDay) {
          const divider = document.createElement("div");
          divider.className = "day-divider";
          divider.textContent = dayLabel(message.createdAt);
          messageList.append(divider);
          previousDay = key;
        }
        messageList.append(createMessage(message));
      }

      requestAnimationFrame(() => {
        if (shouldStick) scrollToLatest(initialRender ? "auto" : "smooth");
        initialRender = false;
        updateScrollButton();
      });
    }

    function startMessages() {
      if (unsubscribe) return;
      const dropsQuery = query(collection(db, COLL), where("kind", "==", "drop"));
      unsubscribe = onSnapshot(dropsQuery, snapshot => {
        messages = snapshot.docs.map(item => ({ id: item.id, ...item.data() }));
        messages.sort((a, b) => toMillis(a.createdAt) - toMillis(b.createdAt));
        renderMessages();
      }, error => {
        console.error(error);
        setConnection("error", "Error", "Could not load messages");
        toast(`Could not load messages: ${error.code || error.message}`, true);
      });
    }

    const persistenceReady = setPersistence(auth, browserLocalPersistence).catch(error => {
      console.error(error);
      authNotice = "Browser storage is unavailable, so sign-in may not remain saved.";
    });

    onAuthStateChanged(auth, async user => {
      await persistenceReady;

      if (isAllowedPasswordUser(user)) {
        authNotice = "";
        unlockApp(user);
        return;
      }

      lockApp();
      if (user) {
        authNotice = "That Firebase account is not authorized. Sign in with the PrivMsg credentials.";
        try {
          await signOut(auth);
        } catch (error) {
          console.error(error);
        }
        showAuthGate(authNotice, true);
        return;
      }

      showAuthGate(authNotice || "Enter your username and password to continue.", Boolean(authNotice));
    });

    loginForm.addEventListener("submit", beginPasswordSignIn);

    attachButton.addEventListener("click", event => {
      event.stopPropagation();
      const willOpen = attachmentMenu.hidden;
      attachmentMenu.hidden = !willOpen;
      attachButton.setAttribute("aria-expanded", String(willOpen));
    });

    uploadButton.addEventListener("click", () => {
      closeAttachmentMenu();
      fileInput.click();
    });
    pasteButton.addEventListener("click", pasteFromClipboard);
    fileInput.addEventListener("change", () => {
      addFiles(fileInput.files);
      fileInput.value = "";
    });

    document.addEventListener("click", event => {
      if (!attachmentMenu.contains(event.target) && event.target !== attachButton) closeAttachmentMenu();
    });

    document.addEventListener("paste", event => {
      const imageItems = [...(event.clipboardData?.items || [])].filter(item => item.type.startsWith("image/"));
      if (!imageItems.length) return;
      event.preventDefault();
      const files = imageItems.map(item => item.getAsFile()).filter(Boolean);
      if (files.length) addFiles(files);
    });

    window.addEventListener("dragenter", event => {
      if (![...(event.dataTransfer?.types || [])].includes("Files")) return;
      event.preventDefault();
      dragDepth++;
      dropOverlay.classList.add("show");
    });
    window.addEventListener("dragover", event => {
      if ([...(event.dataTransfer?.types || [])].includes("Files")) event.preventDefault();
    });
    window.addEventListener("dragleave", event => {
      event.preventDefault();
      dragDepth = Math.max(0, dragDepth - 1);
      if (!dragDepth) dropOverlay.classList.remove("show");
    });
    window.addEventListener("drop", event => {
      event.preventDefault();
      dragDepth = 0;
      dropOverlay.classList.remove("show");
      if (event.dataTransfer?.files?.length) addFiles(event.dataTransfer.files);
    });

    messageInput.addEventListener("input", () => {
      autoSizeInput();
      updateSendState();
    });
    messageInput.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey && !event.isComposing) {
        event.preventDefault();
        sendMessage();
      }
    });
    micButton.addEventListener("click", toggleVoiceRecording);
    sendButton.addEventListener("click", sendMessage);
    scrollBottomButton.addEventListener("click", () => scrollToLatest());
    window.addEventListener("scroll", updateScrollButton, { passive: true });

    lightboxClose.addEventListener("click", closeLightbox);
    lightboxDownload.addEventListener("click", () => {
      if (!temporaryDownloadUrl) return;
      const downloadedUrl = temporaryDownloadUrl;
      temporaryDownloadUrl = "";
      setTimeout(() => URL.revokeObjectURL(downloadedUrl), 60000);
    });
    lightbox.addEventListener("click", event => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        if (!lightbox.hidden) closeLightbox();
        else closeAttachmentMenu();
      }
    });

    window.addEventListener("beforeunload", () => {
      stopRecordingTimer();
      stopMediaTracks();
      releaseStaged();
      if (temporaryDownloadUrl) URL.revokeObjectURL(temporaryDownloadUrl);
      for (const url of attachmentUrlCache.values()) URL.revokeObjectURL(url);
    });

    autoSizeInput();
    updateSendState();
  </script>
</body>
</html>
